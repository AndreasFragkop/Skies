<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skies - Favorites</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#050b16; --card:#0f1a31; --border:rgba(170,214,255,0.22); --text:#edf4ff; --muted:rgba(237,244,255,0.6); --accent:#6dd3ff; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Manrope, sans-serif; color: var(--text); background: radial-gradient(80rem 40rem at 20% -10%, rgba(109,211,255,.2), transparent 60%), var(--bg); padding: 28px 18px; }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { font-family: Sora, sans-serif; margin: 0 0 6px; font-size: clamp(2rem, 5vw, 3rem); }
    h1 .accent {
      color: var(--accent);
      font-style: italic;
    }
    .sub { color: var(--muted); margin-bottom: 16px; font-size: 13px; }
    .top { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .btn { border: 1px solid var(--border); color: var(--text); background: rgba(255,255,255,.04); border-radius: 10px; padding: 9px 12px; text-decoration: none; cursor: pointer; font-size: 13px; }
    .btn:hover { border-color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .card { border: 1px solid var(--border); background: rgba(15,26,49,.72); border-radius: 14px; padding: 12px; }
    .name { font-weight: 700; margin-bottom: 10px; }
    .row { display: flex; gap: 8px; }
    .row .btn { flex: 1; text-align: center; }
    .empty { color: var(--muted); padding: 10px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Favorit<span class="accent">es</span></h1>
    <div class="sub">Saved cities from Skies</div>
    <div class="top">
      <a class="btn" href="index.html">Back to Weather</a>
      <button id="clear-all" class="btn" type="button">Clear All</button>
    </div>
    <div id="fav-list" class="grid"></div>
  </div>
  <script src="favorites.js"></script>
</body>
</html>
